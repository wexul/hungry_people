{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Hungry People</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap пока оставляем, он понадобится дальше -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome для иконок соцсетей и стрелки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Наш CSS -->
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body>

<header class="header">
    <nav class="header__nav">

        <div class="header__side header__side_left">
            <a href="#" class="header__link">Home</a>
            <a href="#" class="header__link">About</a>
            <a href="#" class="header__link">Team</a>
            <a href="#" class="header__link">Booking</a>
        </div>

        <a href="#" class="header__logo">
            <img src="{% static 'main/img/wheel.svg' %}" alt="Hungry People logo">
        </a>

        <div class="header__side header__side_right">
            <a href="#" class="header__link">Menu</a>
            <a href="#" class="header__link">Galerie</a>
            <a href="#" class="header__link">Events</a>
            <a href="#" class="header__link">Contact</a>
        </div>

    </nav>
</header>

<main>
    <section class="hero">

        <div class="hero__line hero__line_left"></div>
        <div class="hero__line hero__line_center_top"></div>
        <div class="hero__line hero__line_center_bottom"></div>
        <div class="hero__line hero__line_right"></div>

        <div class="hero__schedule">
            Mon - Fri: 8PM - 10PM, Sat - Sun: 8PM - 3AM
        </div>

        <div class="hero__content">
            <p class="hero__subtitle">Restaurant</p>

            <h1 class="hero__title">Hungry People</h1>

            <div class="hero__yellow-line"></div>

            <div class="hero__buttons">
                <a href="#" class="hero__button hero__button_yellow">Book Table</a>
                <a href="#" class="hero__button hero__button_outline">Explore</a>
            </div>
        </div>

        <div class="hero__socials">
            <a href="#" class="hero__social">
                <i class="fa-brands fa-facebook-f"></i>
            </a>

            <a href="#" class="hero__social">
                <i class="fa-brands fa-twitter"></i>
            </a>

            <a href="#" class="hero__social">
                <i class="fa-brands fa-instagram"></i>
            </a>
        </div>

        <a href="#" class="hero__down">
            <span>
                <i class="fa-solid fa-chevron-down"></i>
            </span>
        </a>

    </section>
</main>

</body>
</html>
