{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}?v=16">
</head>
<body>
    <main class="password-page">
        <section class="password-page__card">
            <h1>Reset password</h1>

            {% if validlink %}
                <form method="post" autocomplete="off">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit">Save password</button>
                </form>
            {% else %}
                <p>This password reset link is invalid or has expired.</p>
                <a href="{% url 'main:index' %}">Return to the website</a>
            {% endif %}
        </section>
    </main>

    <script>
        (function () {
            const form = document.querySelector(
                '.password-page form[method="post"]'
            );

            if (!form) {
                return;
            }

            function getCookie(name) {
                const cookie = document.cookie
                    .split(';')
                    .map(function (value) {
                        return value.trim();
                    })
                    .find(function (value) {
                        return value.startsWith(name + '=');
                    });

                return cookie
                    ? decodeURIComponent(cookie.split('=').slice(1).join('='))
                    : '';
            }

            function updateCsrfToken() {
                const token = getCookie('csrftoken');
                const input = form.querySelector(
                    '[name="csrfmiddlewaretoken"]'
                );

                if (token && input) {
                    input.value = token;
                }
            }

            updateCsrfToken();
            window.addEventListener('pageshow', updateCsrfToken);

            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) {
                    updateCsrfToken();
                }
            });

            form.addEventListener('submit', updateCsrfToken);
        }());
    </script>
</body>
</html>
